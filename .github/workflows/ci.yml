name: CI

on:
  push:
    branches: [master, feat/quarantine-digest]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Install only the workspaces this CI builds/tests (skip apps/mobile).
      - name: Install
        run: npm ci --include-workspace-root --workspace=@zerospam/shared-api --workspace=web --workspace=server

      - name: Build shared-api
        run: npm run build:shared-api

      - name: Server tests
        run: npm test --workspace=server

      - name: Web tests
        run: npm run test:run --workspace=web

      - name: Build web (tsc + vite)
        run: npm run build --workspace=web

      - name: Build server (tsc)
        run: npm run build --workspace=server
